site_name: "Exploring C"
site_url: https://c.bradpenney.io
site_description: Learn the C programming language from first principles — memory, pointers, and the fundamentals that underpin systems programming.
site_author: Brad Penney
copyright: >-
  Copyright &copy; Brad Penney —
  <a href="#__consent">Change cookie settings</a>

extra:
  analytics:
    provider: google
    property: G-V01MJ4R3SQ
  consent:
    title: Cookie consent
    description: >-
      We use cookies to measure how effective our content is and whether you
      find what you're looking for. With your consent, you help make these
      learning sites better. You can change your choice at any time.
    cookies:
      analytics:
        name: Google Analytics
        checked: false
    actions:
      - accept
      - reject
      - manage
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bradpenney
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/bradpenney
    - icon: fontawesome/solid/globe
      link: https://bradpenney.io
    - icon: fontawesome/solid/rss
      link: https://c.bradpenney.io/feed_rss_created.xml
extra_css:
  - stylesheets/extra.css
theme:
  name: material
  custom_dir: overrides
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    scheme: slate
    primary: black
    accent: amber
  logo: images/exploring_c.png
  favicon: images/exploring_c.png
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  features:
    - content.code.annotate
    - content.tabs.link
    - content.code.highlight
    - content.tooltips
    - content.code.mermaid

plugins:
  - search
  - meta
  - rss:
      match_path: ".*"
      image: https://c.bradpenney.io/images/exploring_c.png
      abstract_chars_count: 160
      length: 20
      date_from_meta:
        as_creation: "date"
        as_update: "git"
        default_timezone: "America/Halifax"
      categories:
        - tags
      use_material_social_cards: false
  - social:
      cards: true
      cards_layout_options:
        background_color: "#1a202c"
        color: "#cbd5e0"

markdown_extensions:
  - toc:
      permalink: "🔗"
      permalink_title: "Link to this section"
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.highlight
  - attr_list

nav:
  - Home: index.md
  - Fundamentals:
      - Hello World: hello_world.md
#      - The Compilation Process: fundamentals/compilation_process.md
#      - What is a Pointer?: fundamentals/what_is_a_pointer.md
#      - The Stack vs The Heap: fundamentals/stack_vs_heap.md
